<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 520" width="2000" height="520" role="img" aria-label="Elyoun — AI and Software Engineering">
  <rect width="2000" height="520" fill="#0A0A0C"/>
  <!-- monogram -->
  <rect x="110" y="110" width="300" height="300" fill="none" stroke="#C8A96A" stroke-width="6"/>
